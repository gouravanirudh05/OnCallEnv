id: cert_expiry
title: TLS certificate expiry on internal service
root_cause_service: auth-service
events:
  - id: ev-1
    timestamp: -12
    type: log
    service: auth-service
    detail: tls handshake failed - certificate expired
    label: root_cause
  - id: ev-2
    timestamp: -10
    type: alert
    service: auth-service
    detail: P1 auth_failure_rate above threshold
    label: root_cause
  - id: ev-3
    timestamp: -9
    type: metric
    service: api-gateway
    detail: auth_failures 0.01 -> 0.22
    label: symptom
  - id: ev-4
    timestamp: -7
    type: alert
    service: api-gateway
    detail: P0 authentication failures
    label: symptom
  - id: ev-5
    timestamp: -6
    type: log
    service: checkout-service
    detail: request rejected due to auth error
    label: symptom
  - id: ev-6
    timestamp: -4
    type: metric
    service: search-service
    detail: latency 90ms -> 200ms
    label: noise
  - id: ev-7
    timestamp: -2
    type: page
    service: on-call
    detail: on-call paged
    label: contributing_factor
investigations:
  - id: diag-1
    prompt: check certificate expiry dates
    reveal: auth-service certificate expired 2 hours ago
